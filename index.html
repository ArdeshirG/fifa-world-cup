<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family World Cup Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
  :root{
    --bg:#F7F4EE;
    --panel:#FFFFFF;
    --line: rgba(30,30,30,0.045);
    --gold:#C98A00;
    --ink:#2B2B29;
    --muted:#767268;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:
      repeating-linear-gradient(0deg, var(--line) 0 1px, transparent 1px 64px),
      repeating-linear-gradient(90deg, var(--line) 0 1px, transparent 1px 64px),
      var(--bg);
    color:var(--ink);
    font-family:'Inter', sans-serif;
    min-height:100vh;
    padding: 32px 20px 60px;
  }
  .wrap{ max-width:980px; margin:0 auto; }
  header{ text-align:center; margin-bottom:28px; }
  .eyebrow{
    font-family:'Bebas Neue', sans-serif;
    letter-spacing:0.06em;
    font-size:clamp(36px, 7vw, 64px);
    font-weight:700;
    color:#1B4332;
    text-transform:uppercase;
  }
  h1{
    font-family:'Space Mono', monospace;
    font-size:clamp(16px, 2.4vw, 22px);
    font-weight:700;
    letter-spacing:0.15em;
    margin:6px 0 2px;
    color:var(--muted);
  }
  .subtitle{ color:var(--muted); font-size:14px; }
  h1 .rest{
    font-size:0.75em;
    text-transform:uppercase;
  }

  .panel{
    background:var(--panel);
    border:1px solid rgba(30,30,30,0.08);
    border-radius:14px;
    padding:22px 18px;
    box-shadow: 0 12px 30px -18px rgba(30,30,30,0.18);
  }
  .chart-holder{ position:relative; height: 420px; }

  .board{
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap:10px;
    margin-top:20px;
  }
  .card{
    background: var(--panel);
    border:1px solid rgba(30,30,30,0.08);
    border-radius:10px;
    padding:12px 14px;
    display:flex;
    align-items:center;
    gap:10px;
  }
  .dot{ width:12px; height:12px; border-radius:50%; flex-shrink:0; }
  .card .name{ font-size:13px; color:var(--muted); }
  .card .score{
    font-family:'Space Mono', monospace;
    font-size:20px;
    font-weight:700;
    color:var(--ink);
    margin-left:auto;
  }
  .card.leader{ border-color:var(--gold); background:rgba(201,138,0,0.07); }
  .card.leader .score{ color:var(--gold); }

  footer{
    text-align:center;
    color:var(--muted);
    font-size:12px;
    margin-top:22px;
    font-family:'Space Mono', monospace;
  }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="eyebrow">World Cup 2026</div>
      <h1><span class="cap">S</span><span class="rest">core</span> <span class="cap">T</span><span class="rest">racker</span></h1>
      <div class="subtitle" id="range-label">Loading standings…</div>
    </header>

    <div class="panel">
      <div class="chart-holder">
        <canvas id="chart"></canvas>
      </div>
    </div>

    <div class="board" id="board"></div>

    <footer>Updated daily from data.json</footer>
  </div>

<script>
  // Hard-coded players and their line colors — edit here if the roster changes.
  const PLAYERS = {
    Ardeshir: "#D55E00",
    Jack:     "#009E73",
    Mike:     "#E69F00",
    Mohammad: "#0072B2",
    Rezvan:   "#56B4E9",
    Tina:     "#CC79A7"
  };

  fetch('data.json?_=' + Date.now()) // cache-bust so daily edits show immediately
    .then(r => r.json())
    .then(render)
    .catch(err => {
      document.getElementById('range-label').textContent = 'Could not load data.json';
      console.error(err);
    });

  function render(days) {
    days.sort((a, b) => new Date(a.date) - new Date(b.date));
    const labels = days.map(d => new Date(d.date).toLocaleDateString('en-GB', { day: '2-digit', month: 'short' }));

    // Running cumulative total per player, so lines show the tournament race.
    const totals = {};
    Object.keys(PLAYERS).forEach(p => totals[p] = 0);

    const datasets = Object.keys(PLAYERS).map(player => {
      const data = days.map(d => {
        totals[player] += (d.scores[player] || 0);
        return totals[player];
      });
      return {
        label: player,
        data,
        borderColor: PLAYERS[player],
        backgroundColor: PLAYERS[player],
        borderWidth: 3,
        pointRadius: 4,
        pointHoverRadius: 6,
        tension: 0.3,
        fill: false
      };
    });

    document.getElementById('range-label').textContent =
      `${labels[0]} — ${labels[labels.length - 1]} · ${days.length} day${days.length > 1 ? 's' : ''} tracked`;

    new Chart(document.getElementById('chart'), {
      type: 'line',
      data: { labels, datasets },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: {
            position: 'top',
            labels: { color: '#2B2B29', font: { family: 'Inter', size: 12 }, usePointStyle: true, boxWidth: 8, padding: 20 }
          },
          tooltip: {
            backgroundColor: '#2B2B29',
            titleColor: '#C98A00',
            bodyColor: '#F7F4EE',
            borderColor: 'rgba(30,30,30,0.1)',
            borderWidth: 1
          }
        },
        scales: {
          x: { grid: { color: 'rgba(30,30,30,0.06)' }, ticks: { color: '#767268', font: { family: 'Space Mono', size: 11 } } },
          y: { grid: { color: 'rgba(30,30,30,0.06)' }, ticks: { color: '#767268', font: { family: 'Space Mono', size: 11 } }, beginAtZero: true }
        }
      }
    });

    // Leaderboard cards, sorted by current total, leader highlighted.
    const board = document.getElementById('board');
    const ranked = Object.entries(totals).sort((a, b) => b[1] - a[1]);
    board.innerHTML = ranked.map(([name, score], i) => `
      <div class="card ${i === 0 ? 'leader' : ''}">
        <span class="dot" style="background:${PLAYERS[name]}"></span>
        <span class="name">${name}</span>
        <span class="score">${score}</span>
      </div>
    `).join('');
  }
</script>
</body>
</html>
