<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family World Cup Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
<style>
  :root{
    --pitch-dark:#0F241C;
    --pitch-panel:#16342A;
    --pitch-line: rgba(244,241,234,0.08);
    --gold:#FFD166;
    --cream:#F4F1EA;
    --muted:#8FA89B;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:
      repeating-linear-gradient(0deg, var(--pitch-line) 0 1px, transparent 1px 64px),
      repeating-linear-gradient(90deg, var(--pitch-line) 0 1px, transparent 1px 64px),
      radial-gradient(ellipse at top, #173C2C 0%, var(--pitch-dark) 70%);
    color:var(--cream);
    font-family:'Inter', sans-serif;
    min-height:100vh;
    padding: 32px 20px 60px;
  }
  .wrap{ max-width:980px; margin:0 auto; }
  header{ text-align:center; margin-bottom:28px; }
  .eyebrow{
    font-family:'Space Mono', monospace;
    letter-spacing:0.25em;
    font-size:12px;
    color:var(--gold);
    text-transform:uppercase;
  }
  h1{
    font-family:'Bebas Neue', sans-serif;
    font-size:clamp(36px, 7vw, 64px);
    letter-spacing:0.03em;
    margin:6px 0 2px;
    color:var(--cream);
  }
  .subtitle{ color:var(--muted); font-size:14px; }

  .panel{
    background:var(--pitch-panel);
    border:1px solid rgba(244,241,234,0.08);
    border-radius:14px;
    padding:22px 18px;
    box-shadow: 0 20px 40px -20px rgba(0,0,0,0.6);
  }
  .chart-holder{ position:relative; height: 420px; }

  .board{
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap:10px;
    margin-top:20px;
  }
  .card{
    background: rgba(244,241,234,0.04);
    border:1px solid rgba(244,241,234,0.07);
    border-radius:10px;
    padding:12px 14px;
    display:flex;
    align-items:center;
    gap:10px;
  }
  .dot{ width:12px; height:12px; border-radius:50%; flex-shrink:0; }
  .card .name{ font-size:13px; color:var(--muted); }
  .card .score{
    font-family:'Space Mono', monospace;
    font-size:20px;
    font-weight:700;
    color:var(--cream);
    margin-left:auto;
  }
  .card.leader{ border-color:var(--gold); background:rgba(255,209,102,0.08); }
  .card.leader .score{ color:var(--gold); }

  footer{
    text-align:center;
    color:var(--muted);
    font-size:12px;
    margin-top:22px;
    font-family:'Space Mono', monospace;
  }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="eyebrow">World Cup 2026 · Family League</div>
      <h1>Score Tracker</h1>
      <div class="subtitle" id="range-label">Loading standings…</div>
    </header>

    <div class="panel">
      <div class="chart-holder">
        <canvas id="chart"></canvas>
      </div>
    </div>

    <div class="board" id="board"></div>

    <footer>Updated daily from data.json</footer>
  </div>

<script>
  // Hard-coded players and their line colors — edit here if the roster changes.
  const PLAYERS = {
    Ardeshir: "#FF6B6B",
    Jack:     "#4ECDC4",
    Mike:     "#FFD166",
    Mohammad: "#C77DFF",
    Rezvan:   "#48CAE4",
    Tina:     "#F72585"
  };

  fetch('data.json?_=' + Date.now()) // cache-bust so daily edits show immediately
    .then(r => r.json())
    .then(render)
    .catch(err => {
      document.getElementById('range-label').textContent = 'Could not load data.json';
      console.error(err);
    });

  function render(days) {
    days.sort((a, b) => new Date(a.date) - new Date(b.date));
    const labels = days.map(d => new Date(d.date).toLocaleDateString('en-GB', { day: '2-digit', month: 'short' }));

    // Running cumulative total per player, so lines show the tournament race.
    const totals = {};
    Object.keys(PLAYERS).forEach(p => totals[p] = 0);

    const datasets = Object.keys(PLAYERS).map(player => {
      const data = days.map(d => {
        totals[player] += (d.scores[player] || 0);
        return totals[player];
      });
      return {
        label: player,
        data,
        borderColor: PLAYERS[player],
        backgroundColor: PLAYERS[player],
        borderWidth: 3,
        pointRadius: 4,
        pointHoverRadius: 6,
        tension: 0.3,
        fill: false
      };
    });

    document.getElementById('range-label').textContent =
      `${labels[0]} — ${labels[labels.length - 1]} · ${days.length} day${days.length > 1 ? 's' : ''} tracked`;

    new Chart(document.getElementById('chart'), {
      type: 'line',
      data: { labels, datasets },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: {
            position: 'top',
            labels: { color: '#F4F1EA', font: { family: 'Inter', size: 12 }, usePointStyle: true, boxWidth: 8 }
          },
          tooltip: {
            backgroundColor: '#0F241C',
            titleColor: '#FFD166',
            bodyColor: '#F4F1EA',
            borderColor: 'rgba(244,241,234,0.15)',
            borderWidth: 1
          }
        },
        scales: {
          x: { grid: { color: 'rgba(244,241,234,0.06)' }, ticks: { color: '#8FA89B', font: { family: 'Space Mono', size: 11 } } },
          y: { grid: { color: 'rgba(244,241,234,0.06)' }, ticks: { color: '#8FA89B', font: { family: 'Space Mono', size: 11 } }, beginAtZero: true }
        }
      }
    });

    // Leaderboard cards, sorted by current total, leader highlighted.
    const board = document.getElementById('board');
    const ranked = Object.entries(totals).sort((a, b) => b[1] - a[1]);
    board.innerHTML = ranked.map(([name, score], i) => `
      <div class="card ${i === 0 ? 'leader' : ''}">
        <span class="dot" style="background:${PLAYERS[name]}"></span>
        <span class="name">${name}</span>
        <span class="score">${score}</span>
      </div>
    `).join('');
  }
</script>
</body>
</html>
